<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Door Display - Weather & Bus</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #000;
      height: 100vh;
      overflow: hidden;
    }
    #container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #weather {
      background: #1a1a2e;
      padding: 10px;
      font-size: 1.4em; /* Smaller text */
      text-align: center;
      flex: 0 0 35%; /* Top ~35% for weather */
      overflow-y: auto;
    }
    #bus {
      flex: 1; /* Bottom takes most space */
      background: #16213e;
      padding: 0;
      overflow: hidden;
    }
    #bus iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .hour {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #333;
      font-size: 1.1em; /* Even smaller per row */
    }
    .hour:last-child { border-bottom: none; }
    .loading { color: #aaa; }
    h2 { margin: 5px 0; font-size: 1.3em; }
  </style>
</head>
<body>
  <div id="container">
    <div id="weather" class="loading">
      <h2>Munich Next 8 Hours</h2>
      <div>Loading...</div>
    </div>

    <div id="bus">
      <!-- MVV EFA departures - search "Kiefernstraße" on first load -->
      <iframe src="https://efa.mvv-muenchen.de/index.html" 
              title="MVV Departures - Search Kiefernstraße"></iframe>
    </div>
  </div>

  <script>
    // Open-Meteo: Next ~8 hours from now (forecast starts near current time)
    fetch('https://api.open-meteo.com/v1/forecast?latitude=48.1351&longitude=11.5820&hourly=temperature_2m,weather_code&timezone=Europe%2FBerlin&forecast_days=1')
      .then(res => res.json())
      .then(data => {
        const hourly = data.hourly;
        const times = hourly.time;
        const temps = hourly.temperature_2m;
        const codes = hourly.weather_code;

        // Find approximate "now" index (first hour >= current time, but approx first 8 for simplicity)
        let html = '';
        const maxHours = Math.min(8, times.length);
        for (let i = 0; i < maxHours; i++) {
          const timeStr = times[i].split('T')[1].slice(0, 5); // HH:MM
          const temp = Math.round(temps[i]);
          const desc = getWeatherDesc(codes[i]);
          html += `
            <div class="hour">
              <span>${timeStr}</span>
              <span>${temp}°C</span>
              <span>${desc.emoji} ${desc.text}</span>
            </div>
          `;
        }
        document.getElementById('weather').innerHTML = '<h2>Munich Next 8 Hours</h2>' + html;
        document.getElementById('weather').classList.remove('loading');
      })
      .catch(() => {
        document.getElementById('weather').innerText = 'Weather unavailable';
        document.getElementById('weather').classList.remove('loading');
      });

    // WMO code to emoji + short text
    function getWeatherDesc(code) {
      if (code === 0) return { text: 'Clear', emoji: '☀️' };
      if ([1,2,3].includes(code)) return { text: 'Clear/Cloudy', emoji: '🌤️' };
      if ([45,48].includes(code)) return { text: 'Fog', emoji: '🌫️' };
      if ([51,53,55].includes(code)) return { text: 'Drizzle', emoji: '🌧️' };
      if ([61,63,65].includes(code)) return { text: 'Rain', emoji: '🌧️' };
      if ([71,73,75].includes(code)) return { text: 'Snow', emoji: '❄️' };
      if ([80,81,82].includes(code)) return { text: 'Showers', emoji: '🌦️' };
      if ([95,96,99].includes(code)) return { text: 'Thunder', emoji: '⛈️' };
      return { text: '?', emoji: '❓' };
    }

    // Refresh every 2 minutes for live bus updates (weather changes slower)
    setInterval(() => location.reload(), 120000);
  </script>
</body>
</html>
