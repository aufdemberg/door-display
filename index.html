<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Door Display - Weather & Bus Departures</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #000;
      height: 100vh;
      overflow: hidden;
    }
    #container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #weather {
      flex: 1;
      background: #1a1a2e;
      padding: 10px;
      font-size: 2em;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #bus {
      flex: 1;
      background: #16213e;
      padding: 0;
      overflow: hidden;
    }
    #bus iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading { color: #aaa; }
  </style>
</head>
<body>
  <div id="container">
    <!-- Weather: Open-Meteo fetch (working for you) -->
    <div id="weather" class="loading">Loading Munich weather...</div>

    <!-- Bus Departures: Iframe of MVV EFA departures for Kiefernstraße -->
    <div id="bus">
      <iframe src="https://efa.mvv-muenchen.de/index.html?name_dm=de:09162:430" 
              title="MVV Departures Kiefernstraße"></iframe>
    </div>
  </div>

  <script>
    // Weather fetch - keep this since it's working
    fetch('https://api.open-meteo.com/v1/forecast?latitude=48.1351&longitude=11.5820&current=temperature_2m,apparent_temperature,weather_code,relative_humidity_2m&timezone=Europe%2FBerlin')
      .then(res => res.json())
      .then(data => {
        const now = data.current;
        const temp = Math.round(now.temperature_2m);
        const feels = Math.round(now.apparent_temperature);
        const hum = now.relative_humidity_2m;
        let wmo = now.weather_code;
        let desc = 'Unknown';
        if (wmo === 0 || wmo === 1) desc = 'Clear';
        else if (wmo <= 3) desc = 'Sunny';
        else if (wmo <= 48) desc = 'Cloudy';
        else if (wmo <= 67) desc = 'Rain';
        else if (wmo <= 77) desc = 'Snow';
        else desc = 'Thunder / Fog';
        document.getElementById('weather').innerHTML = `Munich<br>${temp}°C (feels ${feels}°C)<br>${desc}, ${hum}% hum.`;
        document.getElementById('weather').classList.remove('loading');
      })
      .catch(() => {
        document.getElementById('weather').innerText = 'Weather unavailable';
        document.getElementById('weather').classList.remove('loading');
      });

    // Auto-refresh entire page every 120 seconds for live bus updates
    setInterval(() => location.reload(), 120000);
  </script>
</body>
</html>
